<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Campout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; touch-action: none; }
canvas { display: block; }

#joystick-zone {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 130px;
  height: 130px;
  z-index: 100;
}
#joystick-base {
  position: absolute;
  width: 110px;
  height: 110px;
  left: 10px;
  top: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
}
#joystick-knob {
  position: absolute;
  width: 44px;
  height: 44px;
  left: 33px;
  top: 33px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: 2px solid rgba(255,255,255,0.4);
}

@media (min-width: 769px) {
  #joystick-zone { display: none; }
}
</style>
</head>
<body>
<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>
<div id="build" style="position:fixed;bottom:4px;left:4px;color:rgba(255,255,255,0.3);font-size:10px;font-family:monospace;z-index:50;">v10</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);

// --- LIGHTING ---
const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
sun.position.set(5, 40, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0005;
sun.shadow.normalBias = 0.02;
sun.target.position.set(0, 20, 0);
scene.add(sun);
scene.add(sun.target);

const hemi = new THREE.HemisphereLight(0x88bbff, 0x446622, 0.6);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0x404050, 0.3);
scene.add(ambient);

// --- GLOBE PIVOT (everything on the globe goes in here) ---
const globePivot = new THREE.Group();
scene.add(globePivot);

const GLOBE_RADIUS = 20;
const globeGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
const globeMat = new THREE.MeshStandardMaterial({
  color: 0x4a8c3f,
  roughness: 0.85,
  flatShading: true,
});
const globe = new THREE.Mesh(globeGeo, globeMat);
globe.receiveShadow = true;
globePivot.add(globe);

// --- SEEDED RANDOM ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(42);

// --- UTILITY: place on globe surface ---
function placeOnGlobe(obj, lat, lon, offset = 0) {
  const pos = latLonToWorld(lat, lon);
  const normal = pos.clone().normalize();
  obj.position.copy(pos).addScaledVector(normal, offset);
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, normal);
  obj.quaternion.copy(quat);
}

function latLonToWorld(lat, lon) {
  const x = GLOBE_RADIUS * Math.cos(lat) * Math.cos(lon);
  const y = GLOBE_RADIUS * Math.sin(lat);
  const z = GLOBE_RADIUS * Math.cos(lat) * Math.sin(lon);
  return new THREE.Vector3(x, y, z);
}

function randomPointOnSphere() {
  const u = rng();
  const v = rng();
  const lat = Math.asin(2 * u - 1);
  const lon = 2 * Math.PI * v;
  return { lat, lon };
}

// --- TREES ---
function makeTree(height, trunkColor, foliageColor) {
  const group = new THREE.Group();

  const trunkGeo = new THREE.CylinderGeometry(height * 0.025, height * 0.04, height * 0.5, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: trunkColor, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = height * 0.25;
  trunk.castShadow = true;
  group.add(trunk);

  const layers = 4 + Math.floor(rng() * 3);
  for (let i = 0; i < layers; i++) {
    const layerHeight = height * 0.15;
    const radius = (height * 0.18) * (1 - i * 0.1);
    const y = height * 0.45 + i * layerHeight * 0.65;
    const coneGeo = new THREE.ConeGeometry(radius, layerHeight, 7);
    const shade = new THREE.Color(foliageColor).offsetHSL(0, 0, (rng() - 0.5) * 0.05);
    const coneMat = new THREE.MeshStandardMaterial({ color: shade, roughness: 0.8, flatShading: true });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.y = y;
    cone.rotation.y = rng() * Math.PI;
    cone.castShadow = true;
    group.add(cone);
  }

  return group;
}

const collidables = [];
const trees = [];
for (let i = 0; i < 120; i++) {
  const { lat, lon } = randomPointOnSphere();
  const height = 3 + rng() * 3;
  const trunkColor = new THREE.Color().setHSL(0.07, 0.5 + rng() * 0.2, 0.2 + rng() * 0.1);
  const foliageColor = new THREE.Color().setHSL(0.28 + rng() * 0.08, 0.5 + rng() * 0.2, 0.3 + rng() * 0.15);
  const tree = makeTree(height, trunkColor, foliageColor);
  placeOnGlobe(tree, lat, lon, -0.15);
  globePivot.add(tree);
  trees.push({ obj: tree, lat, lon });
  collidables.push({ lat, lon, radius: 0.4 });
}

// --- ROCKS ---
// --- ROCKS ---
for (let i = 0; i < 40; i++) {
  const { lat, lon } = randomPointOnSphere();
  const size = 0.2 + rng() * 0.5;
  const geo = new THREE.DodecahedronGeometry(size, 0);
  const shade = 0.4 + rng() * 0.2;
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(shade, shade * 0.95, shade * 0.85),
    roughness: 0.9,
    flatShading: true,
  });
  const rock = new THREE.Mesh(geo, mat);
  rock.scale.set(1, 0.5 + rng() * 0.5, 1);
  rock.castShadow = true;
  placeOnGlobe(rock, lat, lon);
  globePivot.add(rock);
  collidables.push({ lat, lon, radius: size * 0.8 });
}

// --- FLOWERS ---
for (let i = 0; i < 60; i++) {
  const { lat, lon } = randomPointOnSphere();
  const group = new THREE.Group();
  const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 3);
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x3d7a2a });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = 0.15;
  group.add(stem);

  const petalColor = [0xff6b9d, 0xffd93d, 0xffffff, 0xc084fc, 0xff8c42][Math.floor(rng() * 5)];
  const petalGeo = new THREE.SphereGeometry(0.08, 5, 4);
  const petalMat = new THREE.MeshStandardMaterial({ color: petalColor });
  const petal = new THREE.Mesh(petalGeo, petalMat);
  petal.position.y = 0.32;
  petal.scale.y = 0.6;
  group.add(petal);

  placeOnGlobe(group, lat, lon);
  globePivot.add(group);
}

// --- LAKES ---
function buildLake(lat, lon, radius) {
  const group = new THREE.Group();
  const waterGeo = new THREE.CircleGeometry(radius, 20);
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x3399bb,
    roughness: 0.1,
    metalness: 0.15,
    transparent: true,
    opacity: 0.75,
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI / 2;
  water.position.y = 0.05;
  group.add(water);

  const bankGeo = new THREE.CircleGeometry(radius + 0.3, 20);
  const bankMat = new THREE.MeshStandardMaterial({ color: 0x6b5b3a, roughness: 1.0 });
  const bank = new THREE.Mesh(bankGeo, bankMat);
  bank.rotation.x = -Math.PI / 2;
  bank.position.y = 0.02;
  group.add(bank);

  placeOnGlobe(group, lat, lon);
  return group;
}

// --- RIVER ---
function buildRiver(startLat, startLon, endLat, endLon, segments) {
  const group = new THREE.Group();
  const waterWidth = 0.3;
  const bankWidth = 0.5;

  const pathPoints = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const lat = startLat + (endLat - startLat) * t + Math.sin(t * Math.PI * 4) * 0.06;
    const lon = startLon + (endLon - startLon) * t + Math.cos(t * Math.PI * 3) * 0.05;
    pathPoints.push({ lat, lon });
  }

  function makeRibbonMesh(width, color, opacity, yOffset) {
    const verts = [];
    for (let i = 0; i < pathPoints.length; i++) {
      const pos = latLonToWorld(pathPoints[i].lat, pathPoints[i].lon);
      const normal = pos.clone().normalize();
      let tangent;
      if (i < pathPoints.length - 1) {
        tangent = latLonToWorld(pathPoints[i+1].lat, pathPoints[i+1].lon).sub(pos).normalize();
      } else {
        tangent = pos.clone().sub(latLonToWorld(pathPoints[i-1].lat, pathPoints[i-1].lon)).normalize();
      }
      const binormal = new THREE.Vector3().crossVectors(normal, tangent).normalize();
      const surfacePos = pos.add(normal.clone().multiplyScalar(yOffset));
      const left = surfacePos.clone().add(binormal.clone().multiplyScalar(-width));
      const right = surfacePos.clone().add(binormal.clone().multiplyScalar(width));
      verts.push(left.x, left.y, left.z, right.x, right.y, right.z);
    }

    const indices = [];
    for (let i = 0; i < pathPoints.length - 1; i++) {
      const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
      indices.push(a, c, b, b, c, d);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    const mat = new THREE.MeshStandardMaterial({
      color, roughness: 0.2, metalness: 0.1, transparent: true, opacity, side: THREE.DoubleSide,
    });
    return new THREE.Mesh(geo, mat);
  }

  group.add(makeRibbonMesh(bankWidth, 0x6b5b3a, 1.0, 0.02));
  group.add(makeRibbonMesh(waterWidth, 0x3399bb, 0.8, 0.04));
  return group;
}

const lakePosArray = [];
for (let i = 0; i < 5; i++) {
  const { lat, lon } = randomPointOnSphere();
  const radius = 1.2 + rng() * 1.8;
  globePivot.add(buildLake(lat, lon, radius));
  lakePosArray.push({ lat, lon });
}

for (let i = 0; i < lakePosArray.length - 1; i += 2) {
  const a = lakePosArray[i];
  const b = lakePosArray[i + 1];
  globePivot.add(buildRiver(a.lat, a.lon, b.lat, b.lon, 80));
}

// --- PLAYER ---
let playerFacing = 0;
let walkCycle = 0;

function buildPlayer() {
  const group = new THREE.Group();

  const bodyGeo = new THREE.CapsuleGeometry(0.22, 0.3, 4, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd35f3e, roughness: 0.7 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);

  const headGeo = new THREE.SphereGeometry(0.18, 8, 6);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xf4c89b, roughness: 0.6 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.05;
  head.castShadow = true;
  group.add(head);

  const noseGeo = new THREE.SphereGeometry(0.05, 6, 4);
  const noseMat = new THREE.MeshStandardMaterial({ color: 0xf4a080, roughness: 0.6 });
  const nose = new THREE.Mesh(noseGeo, noseMat);
  nose.position.set(0, 1.03, 0.17);
  group.add(nose);

  const beardGeo = new THREE.SphereGeometry(0.2, 7, 5);
  const beardMat = new THREE.MeshStandardMaterial({ color: 0xaa2200, roughness: 0.85 });
  const beard = new THREE.Mesh(beardGeo, beardMat);
  beard.position.set(0, 0.88, 0.12);
  beard.scale.set(1, 1.3, 0.8);
  beard.castShadow = true;
  group.add(beard);

  const beardTip = new THREE.Mesh(
    new THREE.ConeGeometry(0.12, 0.2, 6),
    beardMat
  );
  beardTip.position.set(0, 0.72, 0.14);
  beardTip.rotation.x = 0.1;
  group.add(beardTip);

  const hatGeo = new THREE.CylinderGeometry(0.12, 0.2, 0.14, 8);
  const hatMat = new THREE.MeshStandardMaterial({ color: 0x5c3d1e, roughness: 0.8 });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.y = 1.2;
  hat.castShadow = true;
  group.add(hat);

  const brimGeo = new THREE.CylinderGeometry(0.24, 0.24, 0.03, 8);
  const brim = new THREE.Mesh(brimGeo, hatMat);
  brim.position.y = 1.14;
  brim.castShadow = true;
  group.add(brim);

  const legMat = new THREE.MeshStandardMaterial({ color: 0x3d5a80, roughness: 0.8 });
  const leftLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.2, 3, 6), legMat);
  leftLeg.position.set(-0.1, 0.2, 0);
  leftLeg.castShadow = true;
  group.add(leftLeg);
  group.userData.leftLeg = leftLeg;

  const rightLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.2, 3, 6), legMat);
  rightLeg.position.set(0.1, 0.2, 0);
  rightLeg.castShadow = true;
  group.add(rightLeg);
  group.userData.rightLeg = rightLeg;

  const armMat = new THREE.MeshStandardMaterial({ color: 0xd35f3e, roughness: 0.7 });
  const leftArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.2, 3, 6), armMat);
  leftArm.position.set(-0.3, 0.6, 0);
  leftArm.castShadow = true;
  group.add(leftArm);
  group.userData.leftArm = leftArm;

  const rightArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.2, 3, 6), armMat);
  rightArm.position.set(0.3, 0.6, 0);
  rightArm.castShadow = true;
  group.add(rightArm);
  group.userData.rightArm = rightArm;

  const packGeo = new THREE.BoxGeometry(0.3, 0.35, 0.2);
  const packMat = new THREE.MeshStandardMaterial({ color: 0x3d6b35, roughness: 0.8 });
  const pack = new THREE.Mesh(packGeo, packMat);
  pack.position.set(0, 0.65, -0.22);
  pack.castShadow = true;
  group.add(pack);

  const packFlap = new THREE.Mesh(
    new THREE.BoxGeometry(0.28, 0.08, 0.18),
    new THREE.MeshStandardMaterial({ color: 0x2d5528, roughness: 0.8 })
  );
  packFlap.position.set(0, 0.84, -0.22);
  group.add(packFlap);

  return group;
}

const player = buildPlayer();
player.position.set(0, GLOBE_RADIUS - 0.05, 0);
scene.add(player);

// --- CAMERA SETUP ---
camera.position.set(0, GLOBE_RADIUS + 6, 12);
camera.lookAt(0, GLOBE_RADIUS + 1, 0);

// --- INPUT ---
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

let joystickX = 0, joystickY = 0, joystickActive = false, joystickTouchId = null;
const joystickZone = document.getElementById('joystick-zone');
const joystickKnob = document.getElementById('joystick-knob');
const joyRadius = 33;

joystickZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  joystickTouchId = e.changedTouches[0].identifier;
  joystickActive = true;
  updateJoystick(e.changedTouches[0]);
});
joystickZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystickTouchId) updateJoystick(t);
  }
});
joystickZone.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystickTouchId) {
      joystickActive = false;
      joystickTouchId = null;
      joystickX = joystickY = 0;
      joystickKnob.style.left = '33px';
      joystickKnob.style.top = '33px';
    }
  }
});

function updateJoystick(touch) {
  const rect = joystickZone.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > joyRadius) { dx = dx / dist * joyRadius; dy = dy / dist * joyRadius; }
  joystickX = dx / joyRadius;
  joystickY = dy / joyRadius;
  joystickKnob.style.left = (33 + dx) + 'px';
  joystickKnob.style.top = (33 + dy) + 'px';
}

// --- CAMERA ORBIT STATE ---
let cameraAngle = Math.PI;
let cameraTargetAngle = Math.PI;
let cameraDistance = 12;
let cameraHeight = 6;
let cameraManual = false;
let lastTouchAngle = null;
let pinchStartDist = null;
let pinchStartZoom = null;

// Mouse/touch drag to orbit camera
let isDragging = false;
let dragStartX = 0;
let dragStartAngle = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.target !== renderer.domElement) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartAngle = cameraAngle;
  cameraManual = true;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  cameraAngle = dragStartAngle + dx * 0.01;
  cameraTargetAngle = cameraAngle;
});
window.addEventListener('mouseup', () => { isDragging = false; });

// Touch orbit (single finger on canvas, not joystick)
let orbitTouchId = null;
let orbitStartX = 0;
let orbitStartAngle = 0;

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const joyRect = document.getElementById('joystick-zone').getBoundingClientRect();
    if (touch.clientX > joyRect.right || touch.clientY < joyRect.top) {
      orbitTouchId = touch.identifier;
      orbitStartX = touch.clientX;
      orbitStartAngle = cameraAngle;
      cameraManual = true;
    }
  }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx * dx + dy * dy);
    pinchStartZoom = cameraDistance;
  }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchStartDist) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const scale = pinchStartDist / dist;
    cameraDistance = Math.max(6, Math.min(25, pinchStartZoom * scale));
    return;
  }
  for (const touch of e.changedTouches) {
    if (touch.identifier === orbitTouchId) {
      const dx = touch.clientX - orbitStartX;
      cameraAngle = orbitStartAngle + dx * 0.01;
      cameraTargetAngle = cameraAngle;
    }
  }
});
renderer.domElement.addEventListener('touchend', (e) => {
  for (const touch of e.changedTouches) {
    if (touch.identifier === orbitTouchId) orbitTouchId = null;
  }
  if (e.touches.length < 2) pinchStartDist = null;
});

// Scroll/keyboard zoom
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  cameraDistance = Math.max(6, Math.min(25, cameraDistance + e.deltaY * 0.01));
}, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.key === '=' || e.key === '+') cameraDistance = Math.max(6, cameraDistance - 0.5);
  if (e.key === '-') cameraDistance = Math.min(25, cameraDistance + 0.5);
});

// --- ANIMATION ---
const clock = new THREE.Clock();
const globeRotation = new THREE.Quaternion();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  let moveInput = 0, turnInput = 0;
  if (keys['w'] || keys['arrowup']) moveInput = 1;
  if (keys['s'] || keys['arrowdown']) moveInput = -1;
  if (keys['a'] || keys['arrowleft']) turnInput = 1;
  if (keys['d'] || keys['arrowright']) turnInput = -1;
  if (joystickActive) {
    moveInput = joystickY;
    turnInput = -joystickX;
  }

  const isWalking = Math.abs(moveInput) > 0.1 || Math.abs(turnInput) > 0.15;
  const moveSpeed = 0.2 * delta;
  const turnSpeed = 1.8 * delta;

  if (Math.abs(turnInput) > 0.1) {
    playerFacing += turnSpeed * turnInput;
  }

  if (Math.abs(moveInput) > 0.1) {
    cameraManual = false;
    const step = moveSpeed * moveInput;
    const rotX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), step * Math.cos(playerFacing));
    const rotZ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -step * Math.sin(playerFacing));
    const newRotation = globeRotation.clone().premultiply(rotX).premultiply(rotZ);

    const playerWorldPos = new THREE.Vector3(0, GLOBE_RADIUS, 0);
    let blocked = false;
    for (const c of collidables) {
      const objPos = latLonToWorld(c.lat, c.lon).applyQuaternion(newRotation);
      const dist = playerWorldPos.distanceTo(objPos);
      if (dist < c.radius + 0.3) { blocked = true; break; }
    }
    if (!blocked) {
      globeRotation.copy(newRotation);
    }
  }

  globePivot.quaternion.copy(globeRotation);
  player.rotation.y = playerFacing;

  // Camera follows behind player ONLY when actively walking
  const isMoving = Math.abs(moveInput) > 0.1;
  if (isMoving && !cameraManual) {
    cameraTargetAngle = playerFacing + Math.PI;
    let angleDiff = cameraTargetAngle - cameraAngle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    cameraAngle += angleDiff * 2.5 * delta;
  }

  const camX = Math.sin(cameraAngle) * cameraDistance;
  const camZ = Math.cos(cameraAngle) * cameraDistance;
  camera.position.set(camX, GLOBE_RADIUS + cameraHeight, camZ);
  camera.lookAt(0, GLOBE_RADIUS + 1, 0);

  if (isWalking) {
    walkCycle += delta * 8;
    const swing = Math.sin(walkCycle) * 0.5;
    player.userData.leftLeg.rotation.x = swing;
    player.userData.rightLeg.rotation.x = -swing;
    player.userData.leftArm.rotation.x = -swing * 0.4;
    player.userData.rightArm.rotation.x = swing * 0.4;
    player.rotation.z = Math.sin(walkCycle) * 0.03;
    player.position.y = GLOBE_RADIUS - 0.05 + Math.abs(Math.sin(walkCycle * 2)) * 0.02;
  } else {
    walkCycle = 0;
    player.userData.leftLeg.rotation.x *= 0.85;
    player.userData.rightLeg.rotation.x *= 0.85;
    player.userData.leftArm.rotation.x *= 0.85;
    player.userData.rightArm.rotation.x *= 0.85;
    player.rotation.z *= 0.9;
    player.position.y += (GLOBE_RADIUS - 0.05 - player.position.y) * 0.1;
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
