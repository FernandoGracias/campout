<div id="build" style="position:fixed;bottom:4px;left:4px;color:rgba(255,255,255,0.3);font-size:10px;font-family:monospace;z-index:50;">v27</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);

// --- LIGHTING ---
const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
sun.position.set(5, 40, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0005;
sun.shadow.normalBias = 0.02;
sun.target.position.set(0, 20, 0);
scene.add(sun);
scene.add(sun.target);

const hemi = new THREE.HemisphereLight(0x88bbff, 0x446622, 0.6);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0x404050, 0.3);
scene.add(ambient);

// --- GLOBE PIVOT (everything on the globe goes in here) ---
const globePivot = new THREE.Group();
scene.add(globePivot);

const GLOBE_RADIUS = 20;
const globeGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
const globeMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.85,
  flatShading: false,
});
const globe = new THREE.Mesh(globeGeo, globeMat);
globe.receiveShadow = true;
globePivot.add(globe);

// --- SEEDED RANDOM ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(42);

// --- UTILITY: place on globe surface ---
function placeOnGlobe(obj, lat, lon, offset = 0) {
  const pos = latLonToWorld(lat, lon);
  const normal = pos.clone().normalize();
  obj.position.copy(pos).addScaledVector(normal, offset);
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, normal);
  obj.quaternion.copy(quat);
}

function latLonToWorld(lat, lon) {
  const x = GLOBE_RADIUS * Math.cos(lat) * Math.cos(lon);
  const y = GLOBE_RADIUS * Math.sin(lat);
  const z = GLOBE_RADIUS * Math.cos(lat) * Math.sin(lon);
  return new THREE.Vector3(x, y, z);
}

function randomPointOnSphere() {
  const u = rng();
  const v = rng();
  const lat = Math.asin(2 * u - 1);
  const lon = 2 * Math.PI * v;
  return { lat, lon };
}

// --- TREES ---
function makeTree(height, trunkColor, foliageColor) {
  const group = new THREE.Group();

  const trunkGeo = new THREE.CylinderGeometry(height * 0.025, height * 0.04, height * 0.5, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: trunkColor, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = height * 0.25;
  trunk.castShadow = true;
  group.add(trunk);

  const layers = 4 + Math.floor(rng() * 3);
  for (let i = 0; i < layers; i++) {
    const layerHeight = height * 0.15;
    const radius = (height * 0.18) * (1 - i * 0.1);
    const y = height * 0.45 + i * layerHeight * 0.65;
    const coneGeo = new THREE.ConeGeometry(radius, layerHeight, 7);
    const shade = new THREE.Color(foliageColor).offsetHSL(0, 0, (rng() - 0.5) * 0.05);
    const coneMat = new THREE.MeshStandardMaterial({ color: shade, roughness: 0.8, flatShading: true });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.y = y;
    cone.rotation.y = rng() * Math.PI;
    cone.castShadow = true;
    group.add(cone);
  }

  return group;
}

const collidables = [];
const trees = [];
for (let i = 0; i < 120; i++) {
  const { lat, lon } = randomPointOnSphere();
  const height = 3 + rng() * 3;
  const trunkColor = new THREE.Color().setHSL(0.07, 0.5 + rng() * 0.2, 0.2 + rng() * 0.1);
  const foliageColor = new THREE.Color().setHSL(0.35 + rng() * 0.05, 0.6 + rng() * 0.15, 0.18 + rng() * 0.08);
  const tree = makeTree(height, trunkColor, foliageColor);
  placeOnGlobe(tree, lat, lon, -0.15);
  globePivot.add(tree);
  trees.push({ obj: tree, lat, lon });
  collidables.push({ lat, lon, radius: 0.4 });
}

// --- ROCKS ---
// --- ROCKS ---
for (let i = 0; i < 40; i++) {
  const { lat, lon } = randomPointOnSphere();
  const size = 0.2 + rng() * 0.5;
  const geo = new THREE.DodecahedronGeometry(size, 0);
  const shade = 0.4 + rng() * 0.2;
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(shade, shade * 0.95, shade * 0.85),
    roughness: 0.9,
    flatShading: true,
  });
  const rock = new THREE.Mesh(geo, mat);
  rock.scale.set(1, 0.5 + rng() * 0.5, 1);
  rock.castShadow = true;
  placeOnGlobe(rock, lat, lon);
  globePivot.add(rock);
  collidables.push({ lat, lon, radius: size * 0.8 });
}

// --- FLOWERS ---
for (let i = 0; i < 60; i++) {
  const { lat, lon } = randomPointOnSphere();
  const group = new THREE.Group();
  const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 3);
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x3d7a2a });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = 0.15;
  group.add(stem);

  const petalColor = [0xff6b9d, 0xffd93d, 0xffffff, 0xc084fc, 0xff8c42][Math.floor(rng() * 5)];
  const petalGeo = new THREE.SphereGeometry(0.08, 5, 4);
  const petalMat = new THREE.MeshStandardMaterial({ color: petalColor });
  const petal = new THREE.Mesh(petalGeo, petalMat);
  petal.position.y = 0.32;
  petal.scale.y = 0.6;
  group.add(petal);

  placeOnGlobe(group, lat, lon);
  globePivot.add(group);
}

// --- LAKES ---
const lakeData = [];

function buildLake(lat, lon, radius) {
  lakeData.push({ lat, lon, radius });
}

// --- RIVER ---
const riverPaths = [];

function buildRiver(startLat, startLon, endLat, endLon, segments) {
  const waterWidth = 0.3;
  const pathPoints = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const lat = startLat + (endLat - startLat) * t + Math.sin(t * Math.PI * 4) * 0.06;
    const lon = startLon + (endLon - startLon) * t + Math.cos(t * Math.PI * 3) * 0.05;
    pathPoints.push({ lat, lon });
  }
  riverPaths.push({ points: pathPoints, width: waterWidth });
}

const lakePosArray = [];
// One big proper lake
const bigLakeLat = 0.5;
const bigLakeLon = 1.2;
buildLake(bigLakeLat, bigLakeLon, 8.0);
lakePosArray.push({ lat: bigLakeLat, lon: bigLakeLon });

// A few smaller ponds
for (let i = 0; i < 3; i++) {
  const { lat, lon } = randomPointOnSphere();
  const radius = 1.5 + rng() * 1.5;
  buildLake(lat, lon, radius);
  lakePosArray.push({ lat, lon });
}

// Rivers flow OUT of the big lake to smaller ones
for (let i = 1; i < lakePosArray.length; i++) {
  buildRiver(bigLakeLat, bigLakeLon, lakePosArray[i].lat, lakePosArray[i].lon, 80);
}

// --- DEFORM GLOBE (hills, lake basins, river channels) ---
// Simple noise function for hills
function noise2D(x, y) {
  const n = Math.sin(x * 1.3 + y * 0.7) * 0.5 + Math.sin(x * 0.5 - y * 1.1) * 0.3 + Math.sin(x * 2.1 + y * 1.9) * 0.2;
  return n;
}

const globePos = globeGeo.attributes.position;
const vertCount = globePos.count;
const colors = new Float32Array(vertCount * 3);
const baseGreen = new THREE.Color(0x4a8c3f);
const sandColor = new THREE.Color(0xe8c870);
const waterLevel = [];

for (let v = 0; v < vertCount; v++) {
  const vx = globePos.getX(v);
  const vy = globePos.getY(v);
  const vz = globePos.getZ(v);
  const vertPos = new THREE.Vector3(vx, vy, vz);
  const vertNorm = vertPos.clone().normalize();

  // Hills: displace outward based on noise
  const hillAmount = noise2D(vx * 0.3, vz * 0.3) * 0.8 + noise2D(vx * 0.7, vy * 0.5) * 0.4;
  let displacement = Math.max(0, hillAmount) * 0.7;

  // One big foothill
  const foothillPos = latLonToWorld(-0.3, 2.5);
  const foothillDist = vertPos.distanceTo(foothillPos);
  const foothillRadius = 6.0;
  if (foothillDist < foothillRadius) {
    const t = 1 - foothillDist / foothillRadius;
    displacement += t * t * 5.0;
  }

  // Lake depressions: irregular shapes using noise-modulated radius
  let isWater = false;
  for (const lake of lakeData) {
    const lakePos = latLonToWorld(lake.lat, lake.lon);
    const dist = vertPos.distanceTo(lakePos);
    const angle = Math.atan2(vertPos.z - lakePos.z, vertPos.x - lakePos.x);
    const irregularRadius = lake.radius * (0.7 + 0.3 * Math.sin(angle * 3) + 0.15 * Math.sin(angle * 7 + 1));
    if (dist < irregularRadius) {
      const t = 1 - dist / irregularRadius;
      const depthScale = lake.radius > 4 ? 3.0 : 1.2;
      displacement = -depthScale * t * t;
      isWater = true;
    } else if (dist < irregularRadius + 0.6) {
      const t = 1 - (dist - irregularRadius) / 0.6;
      displacement = Math.min(displacement, -0.3 * t);
      isWater = false;
      colors[v * 3] = sandColor.r;
      colors[v * 3 + 1] = sandColor.g;
      colors[v * 3 + 2] = sandColor.b;
      continue;
    }
  }

  // River channels
  for (const river of riverPaths) {
    for (let i = 0; i < river.points.length; i += 2) {
      const rp = latLonToWorld(river.points[i].lat, river.points[i].lon);
      const dist = vertPos.distanceTo(rp);
      if (dist < river.width + 0.2) {
        const t = Math.max(0, 1 - dist / (river.width + 0.2));
        displacement = Math.min(displacement, -0.8 * t);
        if (dist < river.width) isWater = true;
      }
      if (dist < river.width + 0.5 && dist >= river.width + 0.2) {
        const t = 1 - (dist - river.width - 0.2) / 0.3;
        if (t > 0) {
          colors[v * 3] = baseGreen.r + (sandColor.r - baseGreen.r) * t;
          colors[v * 3 + 1] = baseGreen.g + (sandColor.g - baseGreen.g) * t;
          colors[v * 3 + 2] = baseGreen.b + (sandColor.b - baseGreen.b) * t;
          continue;
        }
      }
    }
  }

  const newPos = vertPos.clone().addScaledVector(vertNorm, displacement);
  globePos.setXYZ(v, newPos.x, newPos.y, newPos.z);

  if (isWater) {
    colors[v * 3] = sandColor.r * 0.85;
    colors[v * 3 + 1] = sandColor.g * 0.85;
    colors[v * 3 + 2] = sandColor.b * 0.5;
  } else if (colors[v * 3] === 0) {
    const hillTint = Math.max(0, hillAmount) * 0.15;
    colors[v * 3] = baseGreen.r + hillTint * 0.3;
    colors[v * 3 + 1] = baseGreen.g + hillTint;
    colors[v * 3 + 2] = baseGreen.b + hillTint * 0.2;
  }

  waterLevel.push(isWater);
}

globeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
globeMat.vertexColors = true;
globeMat.needsUpdate = true;
globePos.needsUpdate = true;
globeGeo.computeVertexNormals();

// Water sphere - sits just below ground level, visible wherever terrain dips
const waterSphere = new THREE.Mesh(
  new THREE.SphereGeometry(GLOBE_RADIUS - 0.25, 48, 48),
  new THREE.MeshStandardMaterial({
    color: 0x1a6b8a,
    roughness: 0.05,
    metalness: 0.4,
    transparent: true,
    opacity: 0.9,
  })
);
globePivot.add(waterSphere);

// --- PLAYER TERRAIN FOLLOWING ---
const raycaster = new THREE.Raycaster();

// --- PLAYER ---
let playerFacing = 0;
let walkCycle = 0;

function buildPlayer() {
  const group = new THREE.Group();

  const bodyGeo = new THREE.CapsuleGeometry(0.22, 0.3, 4, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd35f3e, roughness: 0.7 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);

  const headGeo = new THREE.SphereGeometry(0.18, 8, 6);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xf4c89b, roughness: 0.6 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.05;
  head.castShadow = true;
  group.add(head);

  const noseGeo = new THREE.SphereGeometry(0.05, 6, 4);
  const noseMat = new THREE.MeshStandardMaterial({ color: 0xf4a080, roughness: 0.6 });
  const nose = new THREE.Mesh(noseGeo, noseMat);
  nose.position.set(0, 1.03, 0.17);
  group.add(nose);

  const beardGeo = new THREE.SphereGeometry(0.18, 7, 5);
  const beardMat = new THREE.MeshStandardMaterial({ color: 0xaa2200, roughness: 0.85 });
  const beard = new THREE.Mesh(beardGeo, beardMat);
  beard.position.set(0, 0.82, 0.15);
  beard.scale.set(1.1, 1.5, 0.7);
  beard.rotation.x = -0.2;
  beard.castShadow = true;
  group.add(beard);

  const hatGeo = new THREE.CylinderGeometry(0.12, 0.2, 0.14, 8);
  const hatMat = new THREE.MeshStandardMaterial({ color: 0x5c3d1e, roughness: 0.8 });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.y = 1.2;
  hat.castShadow = true;
  group.add(hat);

  const brimGeo = new THREE.CylinderGeometry(0.24, 0.24, 0.03, 8);
  const brim = new THREE.Mesh(brimGeo, hatMat);
  brim.position.y = 1.14;
  brim.castShadow = true;
  group.add(brim);

  const legMat = new THREE.MeshStandardMaterial({ color: 0x3d5a80, roughness: 0.8 });
  const leftLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.2, 3, 6), legMat);
  leftLeg.position.set(-0.1, 0.2, 0);
  leftLeg.castShadow = true;
  group.add(leftLeg);
  group.userData.leftLeg = leftLeg;

  const rightLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.2, 3, 6), legMat);
  rightLeg.position.set(0.1, 0.2, 0);
  rightLeg.castShadow = true;
  group.add(rightLeg);
  group.userData.rightLeg = rightLeg;

  const armMat = new THREE.MeshStandardMaterial({ color: 0xd35f3e, roughness: 0.7 });

  const leftShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.09, 6, 4), armMat);
  leftShoulder.position.set(-0.2, 0.75, 0);
  leftShoulder.castShadow = true;
  group.add(leftShoulder);

  const rightShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.09, 6, 4), armMat);
  rightShoulder.position.set(0.2, 0.75, 0);
  rightShoulder.castShadow = true;
  group.add(rightShoulder);

  const leftArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.2, 3, 6), armMat);
  leftArm.position.set(-0.24, 0.55, 0);
  leftArm.rotation.z = -0.15;
  leftArm.castShadow = true;
  group.add(leftArm);
  group.userData.leftArm = leftArm;

  const rightArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.2, 3, 6), armMat);
  rightArm.position.set(0.24, 0.55, 0);
  rightArm.rotation.z = 0.15;
  rightArm.castShadow = true;
  group.add(rightArm);
  group.userData.rightArm = rightArm;

  const packGeo = new THREE.BoxGeometry(0.28, 0.32, 0.18);
  const packMat = new THREE.MeshStandardMaterial({ color: 0x3d6b35, roughness: 0.8 });
  const pack = new THREE.Mesh(packGeo, packMat);
  pack.position.set(0, 0.62, -0.22);
  pack.castShadow = true;
  group.add(pack);

  const packFlap = new THREE.Mesh(
    new THREE.BoxGeometry(0.26, 0.06, 0.16),
    new THREE.MeshStandardMaterial({ color: 0x2d5528, roughness: 0.8 })
  );
  packFlap.position.set(0, 0.8, -0.22);
  group.add(packFlap);

  const sleepingBag = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07, 0.07, 0.28, 8),
    new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.7 })
  );
  sleepingBag.position.set(0, 0.88, -0.22);
  sleepingBag.rotation.z = Math.PI / 2;
  sleepingBag.castShadow = true;
  group.add(sleepingBag);

  return group;
}

const player = buildPlayer();
player.position.set(0, GLOBE_RADIUS - 0.05, 0);
scene.add(player);

// --- CAMERA SETUP ---
camera.position.set(0, GLOBE_RADIUS + 6, 12);
camera.lookAt(0, GLOBE_RADIUS + 1, 0);

// --- INPUT ---
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

let leverY = 0, leverActive = false, leverTouchId = null;
const leverZone = document.getElementById('lever-zone');
const leverKnob = document.getElementById('lever-knob');
const leverRange = 18;

leverZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  leverTouchId = e.changedTouches[0].identifier;
  leverActive = true;
  updateLever(e.changedTouches[0]);
});
leverZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === leverTouchId) updateLever(t);
  }
});
leverZone.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === leverTouchId) {
      leverActive = false;
      leverTouchId = null;
      leverY = 0;
      leverKnob.style.top = '18px';
    }
  }
});

function updateLever(touch) {
  const rect = leverZone.getBoundingClientRect();
  const cy = rect.top + rect.height / 2;
  let dy = touch.clientY - cy;
  if (dy > leverRange) dy = leverRange;
  if (dy < -leverRange) dy = -leverRange;
  leverY = dy / leverRange;
  leverKnob.style.top = (18 + dy) + 'px';
}

// --- CAMERA ORBIT STATE ---
let cameraAngle = Math.PI;
let cameraTargetAngle = Math.PI;
let cameraDistance = 12;
let cameraHeight = 6;
let cameraManual = false;
let lastTouchAngle = null;
let pinchStartDist = null;
let pinchStartZoom = null;
let pinchStartAvgY = null;
let pinchStartHeight = null;

// Mouse/touch drag to orbit camera
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragStartAngle = 0;
let dragStartHeight = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.target !== renderer.domElement) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartAngle = cameraAngle;
  dragStartY = e.clientY;
  dragStartHeight = cameraHeight;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  cameraAngle = dragStartAngle + dx * 0.01;
  cameraTargetAngle = cameraAngle;
  if (e.shiftKey) {
    cameraHeight = Math.max(1, Math.min(12, dragStartHeight - dy * 0.02));
  }
});
window.addEventListener('mouseup', () => { isDragging = false; });

// Touch orbit (single finger on canvas, not joystick)
let orbitTouchId = null;
let orbitStartX = 0;
let orbitStartY = 0;
let orbitStartAngle = 0;
let orbitStartHeight = 0;

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const joyRect = document.getElementById('lever-zone').getBoundingClientRect();
    if (touch.clientX > joyRect.right || touch.clientY < joyRect.top) {
      orbitTouchId = touch.identifier;
      orbitStartX = touch.clientX;
      orbitStartY = touch.clientY;
      orbitStartAngle = cameraAngle;
      orbitStartHeight = cameraHeight;
    }
  }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx * dx + dy * dy);
    pinchStartZoom = cameraDistance;
    pinchStartAvgY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    pinchStartHeight = cameraHeight;
  }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchStartDist) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const scale = pinchStartDist / dist;
    cameraDistance = Math.max(4, Math.min(60, pinchStartZoom * scale));
    const avgY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    if (!pinchStartAvgY) pinchStartAvgY = avgY;
    const tiltDelta = avgY - pinchStartAvgY;
    cameraHeight = Math.max(1, Math.min(12, pinchStartHeight + tiltDelta * 0.02));
    return;
  }
  for (const touch of e.changedTouches) {
    if (touch.identifier === orbitTouchId) {
      const dx = touch.clientX - orbitStartX;
      cameraAngle = orbitStartAngle + dx * 0.01;
      cameraTargetAngle = cameraAngle;
    }
  }
});
renderer.domElement.addEventListener('touchend', (e) => {
  for (const touch of e.changedTouches) {
    if (touch.identifier === orbitTouchId) orbitTouchId = null;
  }
  if (e.touches.length < 2) { pinchStartDist = null; pinchStartAvgY = null; }
});

// Scroll/keyboard zoom
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  cameraDistance = Math.max(4, Math.min(60, cameraDistance + e.deltaY * 0.01));
}, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.key === '=' || e.key === '+') cameraDistance = Math.max(4, cameraDistance - 0.5);
  if (e.key === '-') cameraDistance = Math.min(60, cameraDistance + 0.5);
});

// --- OPTIONS MENU ---
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('controls').classList.toggle('open');
});

const timeSlider = document.getElementById('time-slider');
const timeDisplay = document.getElementById('time-display');
let timeOfDay = 12;
let moonlightStrength = 0.5;
let fogDensity = 0;

timeSlider.addEventListener('input', (e) => {
  timeOfDay = parseFloat(e.target.value);
  const h = Math.floor(timeOfDay);
  const m = Math.floor((timeOfDay - h) * 60);
  timeDisplay.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
});

document.getElementById('moonlight-slider').addEventListener('input', (e) => {
  moonlightStrength = parseInt(e.target.value) / 100;
});

document.getElementById('fog-slider').addEventListener('input', (e) => {
  fogDensity = parseInt(e.target.value) / 100;
});

// --- FLASHLIGHT ---
let flashlightOn = false;
const flashlight = new THREE.SpotLight(0xfff5dd, 0, 15, Math.PI * 0.25, 0.5, 1);
flashlight.position.set(0.3, GLOBE_RADIUS + 0.6, 0.2);
flashlight.target.position.set(0, GLOBE_RADIUS, 3);
flashlight.castShadow = true;
scene.add(flashlight);
scene.add(flashlight.target);

document.getElementById('btn-flashlight').addEventListener('click', () => {
  flashlightOn = !flashlightOn;
  document.getElementById('btn-flashlight').style.borderColor = flashlightOn ? '#f0c040' : 'rgba(255,255,255,0.3)';
});
document.getElementById('btn-flashlight').addEventListener('touchstart', (e) => {
  e.preventDefault();
  flashlightOn = !flashlightOn;
  document.getElementById('btn-flashlight').style.borderColor = flashlightOn ? '#f0c040' : 'rgba(255,255,255,0.3)';
});

// --- PITCH CAMP ---
let campPitched = false;
let campGroup = null;

let tentColor = 0xcc5522;
let tentStyle = 'aframe';

const tentColorsDiv = document.getElementById('tent-colors');
tentColorsDiv.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-color]');
  if (!btn) return;
  tentColor = parseInt(btn.dataset.color, 16);
  tentColorsDiv.querySelectorAll('button').forEach(b => b.style.borderColor = 'transparent');
  btn.style.borderColor = '#fff';
  if (campPitched) { pitchCamp(); pitchCamp(); }
});
document.getElementById('tent-style').addEventListener('change', (e) => {
  tentStyle = e.target.value;
  if (campPitched) { pitchCamp(); pitchCamp(); }
});

function pitchCamp() {
  if (campPitched && campGroup) {
    globePivot.remove(campGroup);
    campPitched = false;
    document.getElementById('btn-pitch').style.borderColor = 'rgba(255,255,255,0.3)';
    return;
  }
  campGroup = new THREE.Group();

  const tentMat = new THREE.MeshStandardMaterial({ color: tentColor, roughness: 0.7 });
  if (tentStyle === 'aframe') {
    const shape = new THREE.Shape();
    shape.moveTo(-0.6, 0);
    shape.lineTo(0, 0.9);
    shape.lineTo(0.6, 0);
    shape.closePath();
    const geo = new THREE.ExtrudeGeometry(shape, { depth: 1.2, bevelEnabled: false });
    const tent = new THREE.Mesh(geo, tentMat);
    tent.position.set(-0.8, 0, -0.6);
    tent.castShadow = true;
    campGroup.add(tent);
  } else if (tentStyle === 'dome') {
    const geo = new THREE.SphereGeometry(0.8, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2);
    const tent = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: tentColor, roughness: 0.7, side: THREE.DoubleSide }));
    tent.position.set(-0.8, 0, 0);
    tent.castShadow = true;
    campGroup.add(tent);
  } else if (tentStyle === 'cabin') {
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.9, 1.2), tentMat);
    body.position.set(-0.8, 0.45, 0);
    body.castShadow = true;
    campGroup.add(body);
    const roofShape = new THREE.Shape();
    roofShape.moveTo(-0.8, 0);
    roofShape.lineTo(0, 0.4);
    roofShape.lineTo(0.8, 0);
    roofShape.closePath();
    const roof = new THREE.Mesh(
      new THREE.ExtrudeGeometry(roofShape, { depth: 1.2, bevelEnabled: false }),
      new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 })
    );
    roof.position.set(-0.8, 0.9, -0.6);
    roof.castShadow = true;
    campGroup.add(roof);
  } else if (tentStyle === 'tunnel') {
    const geo = new THREE.CylinderGeometry(0.6, 0.6, 1.4, 10, 1, true, 0, Math.PI);
    const tent = new THREE.Mesh(geo, tentMat);
    tent.position.set(-0.8, 0, 0);
    tent.rotation.z = Math.PI / 2;
    tent.rotation.y = Math.PI / 2;
    tent.castShadow = true;
    campGroup.add(tent);
  }

  // Fireplace
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const rockGeo = new THREE.DodecahedronGeometry(0.08, 0);
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.set(Math.cos(angle) * 0.35, 0.05, Math.sin(angle) * 0.35);
    rock.scale.y = 0.5;
    campGroup.add(rock);
  }
  const fireMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.8 });
  const fire = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 5), fireMat);
  fire.position.set(0, 0.2, 0);
  campGroup.add(fire);

  const fireLight = new THREE.PointLight(0xff6622, 2, 5);
  fireLight.position.set(0, 0.5, 0);
  campGroup.add(fireLight);

  // Place on globe surface aligned to terrain
  const inverseRot = globeRotation.clone().invert();
  const surfaceNormal = new THREE.Vector3(0, 1, 0).applyQuaternion(inverseRot);
  const pos = surfaceNormal.clone().multiplyScalar(GLOBE_RADIUS);
  campGroup.position.copy(pos);
  const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), surfaceNormal);
  campGroup.quaternion.copy(quat);

  globePivot.add(campGroup);
  campPitched = true;
  document.getElementById('btn-pitch').style.borderColor = '#f0c040';
}

document.getElementById('btn-pitch').addEventListener('click', pitchCamp);
document.getElementById('btn-pitch').addEventListener('touchstart', (e) => {
  e.preventDefault();
  pitchCamp();
});

function updateDayNight() {
  const hour = timeOfDay;
  let sunIntensity, skyColor, ambientIntensity;

  if (hour < 5 || hour > 21) {
    sunIntensity = 0;
    skyColor = new THREE.Color(0x0a0a1e);
    ambientIntensity = 0.05 + moonlightStrength * 0.15;
  } else if (hour < 7) {
    const t = (hour - 5) / 2;
    sunIntensity = t * 1.2;
    skyColor = new THREE.Color(0x0a0a1e).lerp(new THREE.Color(0x87ceeb), t);
    ambientIntensity = 0.1 + t * 0.2;
  } else if (hour > 19) {
    const t = (21 - hour) / 2;
    sunIntensity = t * 1.2;
    skyColor = new THREE.Color(0x0a0a1e).lerp(new THREE.Color(0x87ceeb), t);
    ambientIntensity = 0.1 + t * 0.2;
  } else {
    sunIntensity = 1.2;
    skyColor = new THREE.Color(0x87ceeb);
    ambientIntensity = 0.3;
  }

  sun.intensity = sunIntensity;
  scene.background = skyColor;
  ambient.intensity = ambientIntensity;
  hemi.intensity = sunIntensity > 0 ? 0.6 : 0.05 + moonlightStrength * 0.1;

  if (fogDensity > 0) {
    scene.fog = new THREE.FogExp2(skyColor, fogDensity * 0.015);
  } else {
    scene.fog = null;
  }

  const isNight = hour < 6 || hour > 20;
  flashlight.intensity = flashlightOn ? 3 : 0;
  if (flashlightOn) {
    flashlight.position.set(
      Math.sin(playerFacing + 0.3) * 0.4,
      GLOBE_RADIUS + 0.6,
      Math.cos(playerFacing + 0.3) * 0.4
    );
    flashlight.target.position.set(
      Math.sin(playerFacing) * 4,
      GLOBE_RADIUS - 0.3,
      Math.cos(playerFacing) * 4
    );
  }
}

// --- ANIMATION ---
const clock = new THREE.Clock();
const globeRotation = new THREE.Quaternion();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  let moveInput = 0;
  if (keys['w'] || keys['arrowup']) moveInput = 1;
  if (keys['s'] || keys['arrowdown']) moveInput = -1;
  if (leverActive) {
    moveInput = leverY;
  }

  // Player always faces where camera is looking
  playerFacing = cameraAngle + Math.PI;

  const isWalking = Math.abs(moveInput) > 0.1;
  const moveSpeed = 0.2 * delta;

  if (Math.abs(moveInput) > 0.1) {
    const step = moveSpeed * moveInput;
    const rotX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), step * Math.cos(playerFacing));
    const rotZ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -step * Math.sin(playerFacing));
    const newRotation = globeRotation.clone().premultiply(rotX).premultiply(rotZ);

    const playerWorldPos = new THREE.Vector3(0, GLOBE_RADIUS, 0);
    let blocked = false;
    for (const c of collidables) {
      const objPos = latLonToWorld(c.lat, c.lon).applyQuaternion(newRotation);
      const dist = playerWorldPos.distanceTo(objPos);
      if (dist < c.radius + 0.3) { blocked = true; break; }
    }
    if (!blocked) {
      globeRotation.copy(newRotation);
    }
  }

  globePivot.quaternion.copy(globeRotation);
  player.rotation.y = playerFacing;

  const camX = Math.sin(cameraAngle) * cameraDistance;
  const camZ = Math.cos(cameraAngle) * cameraDistance;
  camera.position.set(camX, GLOBE_RADIUS + cameraHeight, camZ);
  camera.lookAt(0, GLOBE_RADIUS + 1, 0);

  const isTurning = isDragging || orbitTouchId !== null;

  if (isWalking || isTurning) {
    walkCycle += delta * (isWalking ? 8 : 12);
    const swing = Math.sin(walkCycle) * (isWalking ? 0.5 : 0.35);
    player.userData.leftLeg.rotation.x = swing;
    player.userData.rightLeg.rotation.x = -swing;
    player.userData.leftArm.rotation.x = -swing * 0.4;
    player.userData.rightArm.rotation.x = swing * 0.4;
    player.rotation.z = Math.sin(walkCycle) * (isWalking ? 0.04 : 0.03);
  } else {
    walkCycle = 0;
    player.userData.leftLeg.rotation.x *= 0.85;
    player.userData.rightLeg.rotation.x *= 0.85;
    player.userData.leftArm.rotation.x *= 0.85;
    player.userData.rightArm.rotation.x *= 0.85;
    player.rotation.z *= 0.9;
  }

  // Terrain following: raycast downward to find globe surface
  globe.updateMatrixWorld();
  raycaster.set(new THREE.Vector3(0, GLOBE_RADIUS + 5, 0), new THREE.Vector3(0, -1, 0));
  const hits = raycaster.intersectObject(globe, false);
  if (hits.length > 0) {
    player.position.y = hits[0].point.y;
  }

  updateDayNight();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
