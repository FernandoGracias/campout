<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Campout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; }

#joystick-zone {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 130px;
  height: 130px;
  z-index: 100;
}
#joystick-base {
  position: absolute;
  width: 110px;
  height: 110px;
  left: 10px;
  top: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
}
#joystick-knob {
  position: absolute;
  width: 44px;
  height: 44px;
  left: 33px;
  top: 33px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: 2px solid rgba(255,255,255,0.4);

<div id="controls" style="position:fixed;top:0;right:0;bottom:0;width:260px;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#ddd;padding:60px 16px 16px;z-index:150;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;font-family:monospace;">

<div id="build" style="position:fixed;bottom:4px;left:4px;color:rgba(255,255,255,0.3);font-size:10px;font-family:monospace;z-index:50;">v81</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x68b8e8);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);

// --- LIGHTING ---
const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -40;
sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;
sun.shadow.camera.bottom = -40;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 100;
sun.shadow.bias = -0.0005;
sun.shadow.normalBias = 0.02;
scene.add(sun);
scene.add(sun.target);

const moon = new THREE.DirectionalLight(0x8888ff, 0.3);
moon.castShadow = true;
moon.shadow.mapSize.set(1024, 1024);
moon.shadow.camera.left = -15;
moon.shadow.camera.right = 15;
moon.shadow.camera.top = 15;
moon.shadow.camera.bottom = -15;
moon.shadow.camera.near = 5;
moon.shadow.camera.far = 80;
moon.shadow.bias = -0.0005;
moon.shadow.normalBias = 0.02;
scene.add(moon);
scene.add(moon.target);

// Visual sun and moon spheres
const sunSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 16, 12),
  new THREE.MeshBasicMaterial({ color: 0xffee88 })
);
scene.add(sunSphere);
const moonSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.0, 16, 12),
  new THREE.MeshBasicMaterial({ color: 0xddeeff })
);
scene.add(moonSphere);

const hemi = new THREE.HemisphereLight(0x88bbff, 0x446622, 0.6);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0x404050, 0.3);
scene.add(ambient);

const GLOBE_RADIUS = 20;

// Stars
const starCount = 500;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 150;
  starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Fireflies
const fireflyCount = 20;
const fireflyGeo = new THREE.BufferGeometry();
const fireflyPositions = new Float32Array(fireflyCount * 3);
const fireflyData = [];
for (let i = 0; i < fireflyCount; i++) {
  const u = Math.random();
  const v = Math.random();
  const lat = Math.asin(2 * u - 1);
  const lon = 2 * Math.PI * v;
  const pos = latLonToWorld(lat, lon);
  const normal = pos.clone().normalize();
  const height = 0.5 + Math.random() * 2;
  fireflyPositions[i * 3] = pos.x + normal.x * height;
  fireflyPositions[i * 3 + 1] = pos.y + normal.y * height;
  fireflyPositions[i * 3 + 2] = pos.z + normal.z * height;
  fireflyData.push({ phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 1.5, drift: Math.random() * 0.3 });
}
fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fireflyPositions, 3));
const fireflyMat = new THREE.PointsMaterial({ color: 0xccff44, size: 0.15, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
scene.add(fireflies);

// --- GLOBE PIVOT (everything on the globe goes in here) ---
const globePivot = new THREE.Group();
scene.add(globePivot);

const globeGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
const globeMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.85,
  flatShading: false,
});
const globe = new THREE.Mesh(globeGeo, globeMat);
globe.receiveShadow = true;
globePivot.add(globe);

// Atmosphere glow
const atmosGeo = new THREE.SphereGeometry(GLOBE_RADIUS * 1.2, 64, 64);
const atmosMat = new THREE.ShaderMaterial({
  uniforms: {
    c: { value: 0.4 },
    p: { value: 4.0 },
    glowColor: { value: new THREE.Color(0x4488ff) },
    viewVector: { value: new THREE.Vector3() }
  },
  vertexShader: `
    uniform vec3 viewVector;
    uniform float c;
    uniform float p;
    varying float intensity;
    void main() {
      vec3 vNormal = normalize(normalMatrix * normal);
      vec3 vNormel = normalize(normalMatrix * viewVector);
      intensity = pow(max(c - dot(vNormal, vNormel), 0.0), p);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 glowColor;
    varying float intensity;
    void main() {
      float i = min(intensity, 1.0) * 2.0;
      vec3 glow = glowColor * i;
      gl_FragColor = vec4(glow, min(i, 0.8));
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true,
  depthWrite: false,
});
const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
scene.add(atmosphere);

// --- SEEDED RANDOM ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(42);

// --- UTILITY: place on globe surface ---
function placeOnGlobe(obj, lat, lon, offset = 0) {
  const pos = latLonToWorld(lat, lon);
  const normal = pos.clone().normalize();
  obj.position.copy(pos).addScaledVector(normal, offset);
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, normal);
  obj.quaternion.copy(quat);
}

function latLonToWorld(lat, lon) {
  const x = GLOBE_RADIUS * Math.cos(lat) * Math.cos(lon);
  const y = GLOBE_RADIUS * Math.sin(lat);
  const z = GLOBE_RADIUS * Math.cos(lat) * Math.sin(lon);
  return new THREE.Vector3(x, y, z);
}

function randomPointOnSphere() {
  const u = rng();
  const v = rng();
  const lat = Math.asin(2 * u - 1);
  const lon = 2 * Math.PI * v;
  return { lat, lon };
}

// --- TREES ---
function makeTree(height, trunkColor, foliageColor) {
  const group = new THREE.Group();

  const trunkGeo = new THREE.CylinderGeometry(height * 0.025, height * 0.04, height * 0.5, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: trunkColor, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = height * 0.25;
  trunk.castShadow = true;
  group.add(trunk);

  const layers = 4 + Math.floor(rng() * 3);
  for (let i = 0; i < layers; i++) {
    const layerHeight = height * 0.15;
    const radius = (height * 0.18) * (1 - i * 0.1);
    const y = height * 0.45 + i * layerHeight * 0.65;
    const coneGeo = new THREE.ConeGeometry(radius, layerHeight, 7);
    const shade = new THREE.Color(foliageColor).offsetHSL(0, 0, (rng() - 0.5) * 0.05);
    const coneMat = new THREE.MeshStandardMaterial({ color: shade, roughness: 0.8, flatShading: true });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.y = y;
    cone.rotation.y = rng() * Math.PI;
    cone.castShadow = true;
    group.add(cone);
  }

  return group;
}

const collidables = [];
const trees = [];
for (let i = 0; i < 120; i++) {
  const { lat, lon } = randomPointOnSphere();
  const height = 3 + rng() * 3;
  const trunkColor = new THREE.Color().setHSL(0.07, 0.5 + rng() * 0.2, 0.2 + rng() * 0.1);
  const foliageColor = new THREE.Color().setHSL(0.35 + rng() * 0.05, 0.6 + rng() * 0.15, 0.18 + rng() * 0.08);
  const tree = makeTree(height, trunkColor, foliageColor);
  placeOnGlobe(tree, lat, lon, -0.15);
  globePivot.add(tree);
  trees.push({ obj: tree, lat, lon });
  collidables.push({ lat, lon, radius: 0.08 });
}

// Dense forest area
const forestCenterLat = -0.6;
const forestCenterLon = 3.5;
for (let i = 0; i < 60; i++) {
  const lat = forestCenterLat + (rng() - 0.5) * 1.0;
  const lon = forestCenterLon + (rng() - 0.5) * 1.0;
  const height = 3.5 + rng() * 3.5;
  const trunkColor = new THREE.Color().setHSL(0.07, 0.5 + rng() * 0.2, 0.15 + rng() * 0.1);
  const foliageColor = new THREE.Color().setHSL(0.35 + rng() * 0.04, 0.65 + rng() * 0.15, 0.14 + rng() * 0.06);
  const tree = makeTree(height, trunkColor, foliageColor);
  placeOnGlobe(tree, lat, lon, -0.15);
  globePivot.add(tree);
  trees.push({ obj: tree, lat, lon });
  collidables.push({ lat, lon, radius: 0.08 });
}

// --- ROCKS ---
const rockData = [];
for (let i = 0; i < 40; i++) {
  const { lat, lon } = randomPointOnSphere();
  const size = 0.2 + rng() * 0.5;
  const geo = new THREE.DodecahedronGeometry(size, 0);
  const shade = 0.4 + rng() * 0.2;
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(shade, shade * 0.95, shade * 0.85),
    roughness: 0.9,
    flatShading: true,
  });
  const rock = new THREE.Mesh(geo, mat);
  rock.scale.set(1, 0.5 + rng() * 0.5, 1);
  rock.castShadow = true;
  placeOnGlobe(rock, lat, lon);
  globePivot.add(rock);
  rockData.push({ obj: rock, lat, lon, radius: size * 0.8 });
  collidables.push({ lat, lon, radius: size * 0.8 });
}

// --- FLOWERS ---
for (let i = 0; i < 60; i++) {
  const { lat, lon } = randomPointOnSphere();
  const group = new THREE.Group();
  const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 3);
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x3d7a2a });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = 0.15;
  group.add(stem);

  const petalColor = [0xff6b9d, 0xffd93d, 0xffffff, 0xc084fc, 0xff8c42][Math.floor(rng() * 5)];
  const petalGeo = new THREE.SphereGeometry(0.08, 5, 4);
  const petalMat = new THREE.MeshStandardMaterial({ color: petalColor });
  const petal = new THREE.Mesh(petalGeo, petalMat);
  petal.position.y = 0.32;
  petal.scale.y = 0.6;
  group.add(petal);

  placeOnGlobe(group, lat, lon);
  globePivot.add(group);
}

// --- LAKES ---
const lakeData = [];

function buildLake(lat, lon, radius) {
  lakeData.push({ lat, lon, radius });
}

// --- RIVER ---
const riverPaths = [];

function buildRiver(startLat, startLon, endLat, endLon, segments) {
  const waterWidth = 0.6;
  const pathPoints = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const lat = startLat + (endLat - startLat) * t + Math.sin(t * Math.PI * 4) * 0.06;
    const lon = startLon + (endLon - startLon) * t + Math.cos(t * Math.PI * 3) * 0.05;
    pathPoints.push({ lat, lon });
  }
  const maxGap = 0.3;
  const dense = [pathPoints[0]];
  for (let i = 1; i < pathPoints.length; i++) {
    const prev = pathPoints[i - 1];
    const cur = pathPoints[i];
    const a = latLonToWorld(prev.lat, prev.lon);
    const b = latLonToWorld(cur.lat, cur.lon);
    const dist = a.distanceTo(b);
    const subdivs = Math.max(1, Math.ceil(dist / maxGap));
    for (let s = 1; s <= subdivs; s++) {
      const t = s / subdivs;
      dense.push({ lat: prev.lat + (cur.lat - prev.lat) * t, lon: prev.lon + (cur.lon - prev.lon) * t });
    }
  }
  riverPaths.push({ points: dense, width: waterWidth });
}

const lakePosArray = [];
// One big proper lake
const bigLakeLat = 0.5;

    const irregularRadius = lake.radius * (0.7 + 0.3 * Math.sin(angle * 3) + 0.15 * Math.sin(angle * 7 + 1));
    if (dist < irregularRadius) { inWater = true; break; }
  }
  if (inWater) {

    trees.splice(i, 1);

// --- DEFORM GLOBE (hills, lake basins, river channels) ---
// Simple noise function for hills
function noise2D(x, y) {
  const n = Math.sin(x * 1.3 + y * 0.7) * 0.5 + Math.sin(x * 0.5 - y * 1.1) * 0.3 + Math.sin(x * 2.1 + y * 1.9) * 0.2;
  return n;
}

const globePos = globeGeo.attributes.position;
const vertCount = globePos.count;
const colors = new Float32Array(vertCount * 3);
const baseGreen = new THREE.Color(0x4a8c3f);
const sandColor = new THREE.Color(0xe8c870);
const waterLevel = [];

for (let v = 0; v < vertCount; v++) {
  const vx = globePos.getX(v);
  const vy = globePos.getY(v);
  const vz = globePos.getZ(v);
  const vertPos = new THREE.Vector3(vx, vy, vz);
  const vertNorm = vertPos.clone().normalize();

  // Hills: displace outward based on noise
  const hillAmount = noise2D(vx * 0.3, vz * 0.3) * 0.8 + noise2D(vx * 0.7, vy * 0.5) * 0.4;
  let displacement = Math.max(0, hillAmount) * 0.7;

  // One big foothill
  const foothillPos = latLonToWorld(-0.3, 2.5);
  const foothillDist = vertPos.distanceTo(foothillPos);
  const foothillRadius = 6.0;
  if (foothillDist < foothillRadius) {
    const t = 1 - foothillDist / foothillRadius;
    displacement += t * t * 5.0;
  }

  // Lake depressions: irregular shapes using noise-modulated radius
  let isWater = false;
  for (const lake of lakeData) {
    const lakePos = latLonToWorld(lake.lat, lake.lon);
    const dist = vertPos.distanceTo(lakePos);
    const angle = Math.atan2(vertPos.z - lakePos.z, vertPos.x - lakePos.x);
    const irregularRadius = lake.radius * (0.7 + 0.3 * Math.sin(angle * 3) + 0.15 * Math.sin(angle * 7 + 1));
    if (dist < irregularRadius) {
      const t = 1 - dist / irregularRadius;
      const depthScale = lake.radius > 4 ? 3.0 : 1.2;
      displacement = -depthScale * t * t;
      isWater = true;
    } else if (dist < irregularRadius + 0.6) {
      const t = 1 - (dist - irregularRadius) / 0.6;
      displacement = Math.min(displacement, -0.3 * t);
      isWater = false;
      colors[v * 3] = sandColor.r;
      colors[v * 3 + 1] = sandColor.g;
      colors[v * 3 + 2] = sandColor.b;
      continue;
    }
  }

  // River channels
  for (const river of riverPaths) {
    for (let i = 0; i < river.points.length; i++) {
      const rp = latLonToWorld(river.points[i].lat, river.points[i].lon);
      const dist = vertPos.distanceTo(rp);
      if (dist < river.width + 0.3) {
        const t = Math.max(0, 1 - dist / (river.width + 0.3));
        displacement = Math.min(displacement, -1.2 * t);
        if (dist < river.width) isWater = true;
      }
      if (dist < river.width + 0.6 && dist >= river.width + 0.3) {
        const t = 1 - (dist - river.width - 0.3) / 0.3;
        if (t > 0) {
          colors[v * 3] = baseGreen.r + (sandColor.r - baseGreen.r) * t;
          colors[v * 3 + 1] = baseGreen.g + (sandColor.g - baseGreen.g) * t;
          colors[v * 3 + 2] = baseGreen.b + (sandColor.b - baseGreen.b) * t;
          continue;
        }
      }
    }
  }

  const newPos = vertPos.clone().addScaledVector(vertNorm, displacement);
  globePos.setXYZ(v, newPos.x, newPos.y, newPos.z);

  if (isWater) {
    colors[v * 3] = sandColor.r * 0.85;
    colors[v * 3 + 1] = sandColor.g * 0.85;
    colors[v * 3 + 2] = sandColor.b * 0.5;
  } else if (colors[v * 3] === 0) {
    const hillTint = Math.max(0, hillAmount) * 0.15;
    colors[v * 3] = baseGreen.r + hillTint * 0.3;
    colors[v * 3 + 1] = baseGreen.g + hillTint;
    colors[v * 3 + 2] = baseGreen.b + hillTint * 0.2;
  }

  waterLevel.push(isWater);
}

let leverY = 0, leverX = 0, leverActive = false, leverTouchId = null;

});
leverZone.addEventListener('touchmove', (e) => {

  }
});
leverZone.addEventListener('touchend', (e) => {

function updateLever(touch) {
  const rect = document.getElementById('lever-wrapper').getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dy = touch.clientY - cy;
  let dx = touch.clientX - cx;
  if (controlMode === 'pan') {
    if (dy > leverRange) dy = leverRange;
    if (dy < -leverRange) dy = -leverRange;
    leverY = dy / leverRange;
    leverX = 0;
    leverZone.style.transform = `translateY(${dy}px)`;
  } else {
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxDist = joystickRange;
    if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
    const rawX = dx / maxDist;
    const rawY = dy / maxDist;
    // Dead zone: only ignore left/right if X movement is tiny (< 3px)
    if (Math.abs(dx) > 3) {
      leverX = rawX;
    } else {
      leverX = 0;
    }
    leverY = rawY;
    leverZone.style.transform = `translate(${dx}px, ${dy}px)`;
  }
}

let cameraAngle = Math.PI;
let cameraTargetAngle = Math.PI;
let cameraDistance = 6;
let cameraHeight = 6;
let cameraManual = false;
let lastTouchAngle = null;
let pinchStartDist = null;
let pinchStartZoom = null;
let pinchStartAvgY = null;
let pinchStartHeight = null;
let pinchStartAvgX = null;
let pinchStartAngle = null;

// Mouse/touch drag to orbit camera
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragStartAngle = 0;
let dragStartHeight = 0;

renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.target !== renderer.domElement) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartAngle = cameraAngle;
  dragStartY = e.clientY;
  dragStartHeight = cameraHeight;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  cameraAngle = dragStartAngle + dx * 0.01;

});

// Touch orbit (single finger on canvas, not joystick)
let orbitTouchId = null;
let orbitStartX = 0;
let orbitStartY = 0;
let orbitStartAngle = 0;
let orbitStartHeight = 0;

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1 && !leverActive) {
    const touch = e.touches[0];
    const joyRect = document.getElementById('lever-zone').getBoundingClientRect();
    if (touch.clientX > joyRect.right || touch.clientY < joyRect.top) {
      orbitTouchId = touch.identifier;
      orbitStartX = touch.clientX;
      orbitStartY = touch.clientY;
      orbitStartAngle = cameraAngle;
      orbitStartHeight = cameraHeight;
    }
  }
  // When lever is active and a NEW touch lands on the canvas, use it for orbit
  if (leverActive && e.changedTouches.length > 0 && orbitTouchId === null) {
    for (const touch of e.changedTouches) {
      if (touch.identifier !== leverTouchId) {
        orbitTouchId = touch.identifier;
        orbitStartX = touch.clientX;
        orbitStartY = touch.clientY;
        orbitStartAngle = cameraAngle;
        orbitStartHeight = cameraHeight;
        break;
      }
    }
  }
  if (e.touches.length === 2 && !leverActive) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx * dx + dy * dy);
    pinchStartZoom = cameraDistance;
    pinchStartAvgY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    pinchStartHeight = cameraHeight;
    pinchStartAvgX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    pinchStartAngle = cameraAngle;
  }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchStartDist && !leverActive) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const scale = pinchStartDist / dist;
    cameraDistance = Math.max(4, Math.min(60, pinchStartZoom * scale));
    // Pan via midpoint horizontal movement
    const avgX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    cameraAngle = pinchStartAngle + (avgX - pinchStartAvgX) * 0.01;
    cameraTargetAngle = cameraAngle;
    // Tilt only with deliberate two-finger vertical drag (avgY moved > 30px)
    const avgY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const tiltDelta = avgY - pinchStartAvgY;
    if (Math.abs(tiltDelta) > 30) {
      cameraHeight = Math.max(1, Math.min(12, pinchStartHeight + (tiltDelta - Math.sign(tiltDelta) * 30) * 0.03));
    }
    return;
  }
  for (const touch of e.changedTouches) {
    if (touch.identifier === orbitTouchId) {
      const dx = touch.clientX - orbitStartX;
      cameraAngle = orbitStartAngle + dx * 0.01;
      cameraTargetAngle = cameraAngle;
    }
  }
});
renderer.domElement.addEventListener('touchend', (e) => {
  for (const touch of e.changedTouches) {
    if (touch.identifier === orbitTouchId) orbitTouchId = null;
  }
  if (e.touches.length < 2) {
    pinchStartDist = null; pinchStartAvgY = null; pinchStartAvgX = null;
    // Reset orbit tracking to remaining finger to prevent snap
    if (e.touches.length === 1 && !leverActive) {
      const remaining = e.touches[0];
      orbitTouchId = remaining.identifier;
      orbitStartX = remaining.clientX;
      orbitStartAngle = cameraAngle;
      orbitStartHeight = cameraHeight;
    }
  }
});

(function loadSettings() {
  const saved = localStorage.getItem('campout-settings');
  if (!saved) return;
  const s = JSON.parse(saved);
  if (s.timeOfDay !== undefined) { timeOfDay = s.timeOfDay; document.getElementById('time-slider').value = s.timeOfDay; }
  if (s.moonlight !== undefined) { moonlightStrength = s.moonlight; document.getElementById('moonlight-slider').value = s.moonlight * 100; }
  if (s.fog !== undefined) { fogDensity = s.fog; document.getElementById('fog-slider').value = s.fog * 100; }
  if (s.controlMode) { controlMode = s.controlMode; document.getElementById('control-mode').value = s.controlMode; document.getElementById('joystick-base').style.display = s.controlMode === 'joystick' ? 'block' : 'none'; document.getElementById('lever-track').style.display = s.controlMode === 'pan' ? 'block' : 'none'; }
  if (s.tentColor) { tentColor = parseInt(s.tentColor, 16); }
  if (s.tentStyle) { tentStyle = s.tentStyle; document.getElementById('tent-style').value = s.tentStyle; }
  if (s.timePaused) { timePaused = s.timePaused; document.getElementById('time-pause').checked = s.timePaused; }
  const h = Math.floor(timeOfDay); const m = Math.floor((timeOfDay - h) * 60);
  document.getElementById('time-display').textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
})();

  localStorage.setItem('campout-settings', JSON.stringify({

}

function respawnCampFireParticle(positions, i, randomHeight) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 0.08 + Math.random() * 0.3;
  positions[i * 3] = Math.cos(angle) * dist;
  positions[i * 3 + 1] = randomHeight ? Math.random() * 0.5 : 0;
  positions[i * 3 + 2] = Math.sin(angle) * dist;
  const r = Math.random();
  if (r < 0.01) {
    campFireLifespan[i] = 0.4 + Math.random() * 2.5;
    campFireAlphas[i] = 1;
  } else if (r < 0.08) {
    campFireLifespan[i] = 0.5 + Math.random() * 0.4;
    campFireAlphas[i] = 0;
  } else {
    campFireLifespan[i] = 0.15 + Math.random() * 0.25;
    campFireAlphas[i] = 0;
  }
}

function pitchCamp() {
  if (isSleeping) return;
  if (campPitched && campGroup) {
    globePivot.remove(campGroup);
    campPitched = false;
    document.getElementById('btn-pitch').style.borderColor = 'rgba(255,255,255,0.3)';
    return;
  }
  campGroup = new THREE.Group();

  const tentMat = new THREE.MeshStandardMaterial({ color: tentColor, roughness: 0.7 });
  if (tentStyle === 'aframe') {
    const shape = new THREE.Shape();
    shape.moveTo(-0.6, 0);
    shape.lineTo(0, 0.9);
    shape.lineTo(0.6, 0);
    shape.closePath();
    const geo = new THREE.ExtrudeGeometry(shape, { depth: 1.2, bevelEnabled: false });
    const tent = new THREE.Mesh(geo, tentMat);
    tent.position.set(-0.8, -0.1, -0.6);
    tent.scale.setScalar(1.25);
    tent.castShadow = true;
    tent.userData.needsRaycast = true;
    tent.userData.groundSink = 0.1;
    campGroup.add(tent);
  } else if (tentStyle === 'dome') {
    const geo = new THREE.SphereGeometry(0.8, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2);
    const tent = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: tentColor, roughness: 0.7, side: THREE.DoubleSide }));
    tent.position.set(-0.8, -0.1, 0);
    tent.scale.setScalar(1.25);
    tent.castShadow = true;
    tent.userData.needsRaycast = true;
    tent.userData.groundSink = 0.1;
    campGroup.add(tent);
  } else if (tentStyle === 'cabin') {
    const geo = new THREE.ConeGeometry(0.7, 1.4, 8);
    geo.translate(0, 0.7, 0);
    const tent = new THREE.Mesh(geo, tentMat);
    tent.position.set(-0.8, -0.1, 0);
    tent.scale.setScalar(1.25);
    tent.castShadow = true;
    tent.userData.needsRaycast = true;
    tent.userData.groundSink = 0.1;
    campGroup.add(tent);
  } else if (tentStyle === 'tunnel') {
    const geo = new THREE.CylinderGeometry(0.6, 0.6, 1.4, 10, 1, false);
    const tent = new THREE.Mesh(geo, tentMat);
    tent.position.set(-0.8, 0, 0);
    tent.scale.setScalar(1.25);
    tent.rotation.x = Math.PI / 2;
    tent.castShadow = true;
    tent.userData.needsRaycast = true;
    tent.userData.groundSink = 0.6 * 1.25 * 0.5;
    campGroup.add(tent);
    tent.userData.needsRaycast = true;
    tent.userData.groundSink = 0.1;
    campGroup.add(tent);
  }

  // Fireplace - ported from camping-sim (physics-based fire)
  const fireOffset = new THREE.Vector3(1.5, 0, 0);
  const fireAnchor = new THREE.Group();
  fireAnchor.position.copy(fireOffset);
  campGroup.add(fireAnchor);

  for (let i = 0; i < 14; i++) {
    const size = 0.08 + rng() * 0.12;
    const segments = 3 + Math.floor(rng() * 4);
    const rockGeo = new THREE.SphereGeometry(size, segments, segments);
    const shade = 0.25 + rng() * 0.25;
    const rockMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(shade + rng() * 0.05, shade, shade - rng() * 0.03),
      roughness: 0.8 + rng() * 0.2,
    });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    const a = (i / 14) * Math.PI * 2 + (rng() - 0.5) * 0.3;
    const dist = 0.55 + rng() * 0.2;
    rock.position.set(Math.cos(a) * dist, 0, Math.sin(a) * dist);
    rock.scale.set(0.8 + rng() * 0.5, 0.4 + rng() * 0.4, 0.8 + rng() * 0.5);
    rock.rotation.set(rng() * 0.4, rng() * Math.PI, rng() * 0.4);
    rock.castShadow = true;
    rock.userData.needsRaycast = true;
    fireAnchor.add(rock);
  }

  for (let i = 0; i < 5; i++) {
    const logGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.7, 5);
    const logMat = new THREE.MeshStandardMaterial({ color: 0x3d2810, roughness: 1.0 });
    const log = new THREE.Mesh(logGeo, logMat);
    const angle = (i / 5) * Math.PI * 2;
    log.position.set(Math.cos(angle) * 0.25, 0.08, Math.sin(angle) * 0.25);
    log.rotation.z = Math.PI / 2 - 0.2;
    log.rotation.y = angle;
    log.userData.needsRaycast = true;
    fireAnchor.add(log);
  }

  campCoals = [];
  for (let i = 0; i < 20; i++) {
    const size = 0.03 + rng() * 0.06;
    const coalGeo = new THREE.SphereGeometry(size, 4, 3);
    const coalMat = new THREE.MeshStandardMaterial({
      color: 0x1a0800,
      emissive: 0xff3300,
      emissiveIntensity: 0.3 + rng() * 0.7,
      roughness: 1.0,
    });
    const coal = new THREE.Mesh(coalGeo, coalMat);
    const angle = rng() * Math.PI * 2;
    const dist = rng() * 0.4;
    coal.position.set(Math.cos(angle) * dist, 0.05 + rng() * 0.1, Math.sin(angle) * dist);
    coal.scale.y = 0.4 + rng() * 0.4;
    campCoals.push(coal);
    fireAnchor.add(coal);
  }

  // Fire particles
  campFireGeo = new THREE.BufferGeometry();
  const firePositions = new Float32Array(56 * 3);
  campFireAlphas = new Float32Array(56);
  campFireLifespan = new Float32Array(56);
  for (let i = 0; i < 56; i++) {
    respawnCampFireParticle(firePositions, i, true);
  }
  campFireGeo.setAttribute('position', new THREE.BufferAttribute(firePositions, 3));
  const fireParticleMat = new THREE.PointsMaterial({
    color: 0xff6600, size: 0.25, transparent: true, opacity: 0.8,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const fireParticles = new THREE.Points(campFireGeo, fireParticleMat);
  fireParticles.position.set(0, 0.2, 0);
  fireAnchor.add(fireParticles);

  // Smoke particles
  campSmokeGeo = new THREE.BufferGeometry();
  const smokePositions = new Float32Array(30 * 3);
  campSmokeVelocities = [];
  for (let i = 0; i < 30; i++) {
    smokePositions[i * 3] = (rng() - 0.5) * 0.3;
    smokePositions[i * 3 + 1] = 1.5 + rng() * 2;
    smokePositions[i * 3 + 2] = (rng() - 0.5) * 0.3;
    campSmokeVelocities.push({
      x: (rng() - 0.5) * 0.005,
      y: 0.01 + rng() * 0.015,
      z: (rng() - 0.5) * 0.005,
    });
  }
  campSmokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePositions, 3));
  const smokeMat = new THREE.PointsMaterial({
    color: 0x888888, size: 0.4, transparent: true, opacity: 0.3, depthWrite: false,
  });
  const campSmoke = new THREE.Points(campSmokeGeo, smokeMat);
  campSmoke.position.set(0, 0.3, 0);
  fireAnchor.add(campSmoke);

  campFireLight = new THREE.PointLight(0xff6622, 2, 8);
  campFireLight.position.set(0, 0.8, 0);
  campFireLight.castShadow = true;
  fireAnchor.add(campFireLight);
  campFireLight2 = new THREE.PointLight(0xff4400, 1, 5);
  campFireLight2.position.set(0.2, 0.5, 0.1);
  fireAnchor.add(campFireLight2);

  // Place on globe surface using raycast for proper terrain height
  const inverseRot = globeRotation.clone().invert();
  const surfaceNormal = new THREE.Vector3(0, 1, 0).applyQuaternion(inverseRot);
  const pos = surfaceNormal.clone().multiplyScalar(GLOBE_RADIUS);

  // Raycast from well above to find actual deformed terrain surface
  globe.updateMatrixWorld();
  const rayOrigin = pos.clone().addScaledVector(surfaceNormal, 10);
  const rayDir = surfaceNormal.clone().negate();
  const campRay = new THREE.Raycaster(rayOrigin, rayDir, 0, 20);
  const campHits = campRay.intersectObject(globe, false);
  if (campHits.length > 0) {
    campGroup.position.copy(campHits[0].point);
    const hitNormal = campHits[0].face.normal.clone().transformDirection(globe.matrixWorld).normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), hitNormal);
    campGroup.quaternion.copy(quat);
  } else {
    campGroup.position.copy(pos);
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), surfaceNormal);
    campGroup.quaternion.copy(quat);
  }

  globePivot.add(campGroup);

  // Raycast each fire element to sit on terrain
  campGroup.updateMatrixWorld(true);
  fireAnchor.updateMatrixWorld(true);

  // Raycast the fire anchor center first
  const fireWorldPos = new THREE.Vector3();
  fireAnchor.getWorldPosition(fireWorldPos);
  const fireNorm = fireWorldPos.clone().normalize();
  const fireRayOrig = fireWorldPos.clone().addScaledVector(fireNorm, 3);
  const fireRayD = fireNorm.clone().negate();
  const fireRay = new THREE.Raycaster(fireRayOrig, fireRayD, 0, 10);
  const fireHits = fireRay.intersectObject(globe, false);
  if (fireHits.length > 0) {
    const localHit = campGroup.worldToLocal(fireHits[0].point.clone());
    fireAnchor.position.y = localHit.y;
    fireAnchor.updateMatrixWorld(true);
  }

  // Raycast tent elements to terrain
  for (const child of campGroup.children) {
    if (!child.userData.needsRaycast) continue;
    if (child === fireAnchor) continue;
    child.userData.baseQuaternion = child.quaternion.clone();
    const worldPos = new THREE.Vector3();
    child.getWorldPosition(worldPos);
    const normal = worldPos.clone().normalize();
    const rayOrigin = worldPos.clone().addScaledVector(normal, 3);
    const rayDir = normal.clone().negate();
    const ray = new THREE.Raycaster(rayOrigin, rayDir, 0, 10);
    const hits = ray.intersectObject(globe, false);
    if (hits.length > 0) {
      const localHit = campGroup.worldToLocal(hits[0].point.clone());
      const sink = child.userData.groundSink || 0;
      child.position.y = localHit.y - sink;
      // Orient tent to match terrain slope: compose slope with original rotation
      const hitNormal = hits[0].face.normal.clone().transformDirection(globe.matrixWorld).normalize();
      const invGroupQuat = campGroup.getWorldQuaternion(new THREE.Quaternion()).invert();
      const localNormal = hitNormal.clone().applyQuaternion(invGroupQuat);
      const slopeQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), localNormal);
      child.quaternion.copy(slopeQuat).multiply(child.userData.baseQuaternion);
    }
  }

  for (const child of fireAnchor.children) {
    if (!child.userData.needsRaycast) continue;
    const worldPos = new THREE.Vector3();
    child.getWorldPosition(worldPos);
    const normal = worldPos.clone().normalize();
    const rayOrigin = worldPos.clone().addScaledVector(normal, 3);
    const rayDir = normal.clone().negate();
    const ray = new THREE.Raycaster(rayOrigin, rayDir, 0, 10);
    const hits = ray.intersectObject(globe, false);
    if (hits.length > 0) {
      const localHit = fireAnchor.worldToLocal(hits[0].point.clone());
      child.position.y = localHit.y;
    }
  }

  campPitched = true;
  campGlobeRotation = globeRotation.clone();
  document.getElementById('btn-pitch').style.borderColor = '#f0c040';
}

});

function updateDayNight() {
  const hour = timeOfDay;

  // Sun/moon orbit: sun rises at 6, overhead at 12, sets at 18
  // Full circle over 24 hours, 0h = directly below (nadir)
  // Sun orbit: rises at 6, sets at 21 (summer timing)
  // Map 6-21 (15h of daylight) to 0-PI for the sun arc above horizon
  // Map 21-6 (9h of night) to PI-2PI for below horizon
  let sunAngle;
  if (hour >= 6 && hour <= 21) {
    sunAngle = ((hour - 6) / 15) * Math.PI;
  } else {
    const nightHour = hour >= 21 ? hour - 21 : hour + 3;
    sunAngle = Math.PI + (nightHour / 9) * Math.PI;
  }
  const orbitRadius = 40;
  const sunX = Math.cos(sunAngle) * orbitRadius;
  const sunY = GLOBE_RADIUS + Math.sin(sunAngle) * orbitRadius;
  const sunZ = 0;

  sun.position.set(sunX, sunY, sunZ);
  sun.target.position.set(0, GLOBE_RADIUS, 0);
  sunSphere.position.copy(sun.position);

  // Moon is opposite the sun
  moon.position.set(-sunX, GLOBE_RADIUS + Math.sin(sunAngle + Math.PI) * orbitRadius, 0);
  moon.target.position.set(0, GLOBE_RADIUS, 0);
  moonSphere.position.copy(moon.position);

  // Intensity based on altitude
  const sunAltitude = Math.sin(sunAngle);
  let sunIntensity, skyColor, ambientIntensity;

  if (sunAltitude < -0.15) {
    sunIntensity = 0;
    skyColor = new THREE.Color(0x0a0a1e);
    ambientIntensity = 0.05 + moonlightStrength * 0.15;
    moon.intensity = 0.2 + moonlightStrength * 0.3;
    moonSphere.visible = true;
    moonSphere.material.opacity = 1;
    moonSphere.material.transparent = false;
    moonSphere.material.color.set(0xddeeff);
    sunSphere.visible = true;
    sunSphere.material.opacity = 0;
    sunSphere.material.transparent = true;
  } else if (sunAltitude < 0.15) {
    const t = (sunAltitude + 0.15) / 0.3;
    sunIntensity = t * 1.2;
    skyColor = new THREE.Color(0x0a0a1e).lerp(new THREE.Color(0xffaa55), t).lerp(new THREE.Color(0x68b8e8), Math.max(0, t - 0.5) * 2);
    ambientIntensity = 0.1 + t * 0.2;
    moon.intensity = (1 - t) * (0.2 + moonlightStrength * 0.3);
    moonSphere.visible = true;
    moonSphere.material.transparent = true;
    moonSphere.material.opacity = Math.max(0, 1 - t * 1.5);
    moonSphere.material.color.copy(new THREE.Color(0xddeeff).lerp(new THREE.Color(0x68b8e8), Math.min(t * 2, 1.0)));
    sunSphere.visible = true;
    sunSphere.material.transparent = true;
    sunSphere.material.opacity = Math.min(1, t * 1.2);
  } else {
    sunIntensity = 1.2;
    skyColor = new THREE.Color(0x68b8e8);
    ambientIntensity = 0.3;
    moon.intensity = 0;
    moonSphere.visible = true;
    moonSphere.material.opacity = 0;
    moonSphere.material.transparent = true;
    sunSphere.visible = true;
    sunSphere.material.opacity = 1;
    sunSphere.material.transparent = false;
  }

  sun.intensity = sunIntensity;
  scene.background = skyColor;
  ambient.intensity = ambientIntensity;
  hemi.intensity = sunIntensity > 0 ? 0.6 : 0.05 + moonlightStrength * 0.1;

  if (fogDensity > 0) {
    scene.fog = new THREE.FogExp2(skyColor, fogDensity * 0.15);
  } else {
    scene.fog = null;
  }

  flashlight.intensity = flashlightOn ? 15 : 0;
  if (flashlightOn) {
    const handOffsetRight = 0.35;
    const handHeight = 0.55;
    flashlight.position.set(
      Math.sin(playerFacing) * 0.3 + Math.sin(playerFacing - Math.PI/2) * handOffsetRight,
      player.position.y + handHeight,
      Math.cos(playerFacing) * 0.3 + Math.cos(playerFacing - Math.PI/2) * handOffsetRight
    );
    flashlight.target.position.set(
      Math.sin(playerFacing) * 5,
      player.position.y - 0.5,
      Math.cos(playerFacing) * 5
    );
  }

  // Stars visible at night
  starMat.opacity = sunAltitude < 0 ? Math.min(1, -sunAltitude * 5) : 0;

  // Fireflies visible at dusk/night
  const fireflyVisibility = sunAltitude < 0.1 ? Math.min(1, (0.1 - sunAltitude) * 5) : 0;
  fireflyMat.opacity = fireflyVisibility;
}

// --- ANIMATION ---
const clock = new THREE.Clock();
const globeRotation = new THREE.Quaternion();
globeRotation.setFromAxisAngle(new THREE.Vector3(1, 0, 0), -0.6);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  stars.rotation.y += delta * 0.003;

  let moveInput = 0;
  if (keys['w'] || keys['arrowup']) moveInput = -1;
  if (keys['s'] || keys['arrowdown']) moveInput = 1;
  if (controlMode === 'joystick') {
    if (keys['a'] || keys['arrowleft']) playerFacing -= 2.5 * delta;
    if (keys['d'] || keys['arrowright']) playerFacing += 2.5 * delta;
  } else {
    if (keys['a'] || keys['arrowleft']) cameraAngle -= 2.5 * delta;
    if (keys['d'] || keys['arrowright']) cameraAngle += 2.5 * delta;
  }
  if (leverActive) {
    moveInput = leverY;
    walkingToTent = false;
  }

  // Auto-walk to tent
  if (walkingToTent && campGlobeRotation) {
    const target = campGlobeRotation.clone().invert();
    const current = globeRotation.clone().invert();
    const angle = current.angleTo(target);
    if (angle < 0.02) {
      enterTent();
    } else {
      globeRotation.slerp(campGlobeRotation, Math.min(1, 2.0 * delta / angle));
      moveInput = 0;
    }
  }

  if (isSleeping) { moveInput = 0; }

  // Control mode: pan = camera angle drives facing, joystick = leverX turns character
  if (controlMode === 'pan') {
    playerFacing = cameraAngle + Math.PI;
  } else {
    if (leverActive && Math.abs(leverX) > 0.1) {
      playerFacing -= leverX * 2.5 * delta;
    }
    // Camera follows behind player in joystick mode (unless free-looking)
    const isFreeLooking = isDragging || orbitTouchId !== null;
    if (!isFreeLooking) {
      const targetCamAngle = playerFacing - Math.PI;
      let angleDiff = targetCamAngle - cameraAngle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      if (Math.abs(moveInput) > 0.1) {
        cameraAngle += angleDiff * 3 * delta;
      }
    }
  }

  const isWalking = Math.abs(moveInput) > 0.1 || walkingToTent;
  const moveSpeed = 0.2 * delta;

  if (Math.abs(moveInput) > 0.1) {
    const step = moveSpeed * moveInput;
    const rotX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), step * Math.cos(playerFacing));
    const rotZ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -step * Math.sin(playerFacing));
    const newRotation = globeRotation.clone().premultiply(rotX).premultiply(rotZ);

    const playerWorldPos = new THREE.Vector3(0, GLOBE_RADIUS, 0);
    let canMove = true;
    for (const c of collidables) {
      const newObjPos = latLonToWorld(c.lat, c.lon).applyQuaternion(newRotation);
      const newDist = playerWorldPos.distanceTo(newObjPos);
      const minDist = c.radius + 0.5;
      if (newDist < minDist) {
        const curObjPos = latLonToWorld(c.lat, c.lon).applyQuaternion(globeRotation);
        const curDist = playerWorldPos.distanceTo(curObjPos);
        if (newDist < curDist) {
          canMove = false;
          break;
        }
      }
    }
    if (canMove) {
      globeRotation.copy(newRotation);
    } else {
      // Smooth slide: try progressively larger angle offsets to find a clear path
      let slid = false;
      for (const angleOffset of [0.4, -0.4, 0.8, -0.8, 1.2, -1.2, Math.PI/2, -Math.PI/2]) {
        const slideAngle = playerFacing + angleOffset;
        const sRotX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), step * 0.8 * Math.cos(slideAngle));
        const sRotZ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -step * 0.8 * Math.sin(slideAngle));
        const slideRotation = globeRotation.clone().premultiply(sRotX).premultiply(sRotZ);
        let slideOk = true;
        for (const c of collidables) {
          const sObjPos = latLonToWorld(c.lat, c.lon).applyQuaternion(slideRotation);
          const sDist = playerWorldPos.distanceTo(sObjPos);
          const curObjPos = latLonToWorld(c.lat, c.lon).applyQuaternion(globeRotation);
          const curDist = playerWorldPos.distanceTo(curObjPos);
          if (sDist < c.radius + 0.5 && sDist < curDist) { slideOk = false; break; }
        }
        if (slideOk) {
          globeRotation.copy(slideRotation);
          slid = true;
          break;
        }
      }
    }
  }

  globePivot.quaternion.copy(globeRotation);
  player.rotation.y = playerFacing;

  // Camera: cameraHeight is tilt (1=ground level, 12=overhead), cameraDistance is total distance
  const tiltFraction = cameraHeight / 12;
  const playerY = player.position.y;
  const camY = playerY + tiltFraction * cameraDistance;
  const camHorizDist = cameraDistance * (1 - tiltFraction * 0.85);
  const camX = Math.sin(cameraAngle) * camHorizDist;
  const camZ = Math.cos(cameraAngle) * camHorizDist;
  camera.position.set(camX, camY, camZ);
  camera.lookAt(0, playerY + 1, 0);
  atmosMat.uniforms.viewVector.value.copy(camera.position);

  const isKeyTurning = keys['a'] || keys['d'] || keys['arrowleft'] || keys['arrowright'];
  const isCameraPanTurning = (isDragging || orbitTouchId !== null) && controlMode === 'pan';
  const isTurning = isCameraPanTurning || isKeyTurning;

  if (isWalking || isTurning) {
    walkCycle += delta * (isWalking ? 8 : 12);
    const swing = Math.sin(walkCycle) * (isWalking ? 0.5 : 0.35);
    player.userData.leftLeg.rotation.x = swing;
    player.userData.rightLeg.rotation.x = -swing;
    player.userData.leftArm.rotation.x = -swing * 0.4;
    player.userData.rightArm.rotation.x = swing * 0.4;
    player.rotation.z = Math.sin(walkCycle) * (isWalking ? 0.04 : 0.03);
  } else {
    walkCycle = 0;
    player.userData.leftLeg.rotation.x *= 0.85;
    player.userData.rightLeg.rotation.x *= 0.85;
    player.userData.leftArm.rotation.x *= 0.85;
    player.userData.rightArm.rotation.x *= 0.85;
    player.rotation.z *= 0.9;
  }

  // Terrain following: raycast downward to find globe surface
  globe.updateMatrixWorld();
  raycaster.set(new THREE.Vector3(0, GLOBE_RADIUS + 5, 0), new THREE.Vector3(0, -1, 0));
  const hits = raycaster.intersectObject(globe, false);
  if (hits.length > 0) {
    player.position.y = hits[0].point.y;
  }

  // Day/night cycle: 10 minutes = full 24h, sleeping = 1h per 10s
  if (!timePaused) {
    const timeSpeed = isSleeping ? (3600 / 10) / 3600 : (24 / 600);
    timeOfDay += timeSpeed * delta;
    if (timeOfDay >= 24) timeOfDay -= 24;
    document.getElementById('time-slider').value = timeOfDay;
    const h = Math.floor(timeOfDay);
    const m = Math.floor((timeOfDay - h) * 60);
    document.getElementById('time-display').textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
  }
  updateDayNight();

  // Animate fireflies
  if (fireflyMat.opacity > 0) {
    fireflies.quaternion.copy(globeRotation);
    const fp = fireflyGeo.attributes.position.array;
    for (let i = 0; i < fireflyCount; i++) {
      const d = fireflyData[i];
      fp[i * 3] += Math.sin(clock.elapsedTime * d.speed + d.phase) * d.drift * delta;
      fp[i * 3 + 1] += Math.sin(clock.elapsedTime * d.speed * 0.7 + d.phase * 2) * 0.2 * delta;
      fp[i * 3 + 2] += Math.cos(clock.elapsedTime * d.speed * 0.5 + d.phase) * d.drift * delta;
    }
    fireflyGeo.attributes.position.needsUpdate = true;
  }

  // Animate sleep Zs
  if (isSleeping && campGroup) {
    sleepZTimer += delta;
    // Spawn a set of 3 Zs every 5 seconds, staggered 250ms apart
    if (sleepZTimer > 5) {
      sleepZTimer = 0;
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          if (!isSleeping) return;
          const sprite = makeZSprite(i);
          sprite.position.set(
            (Math.random() - 0.5) * 0.3,
            1.0 + i * 0.2,
            (Math.random() - 0.5) * 0.3
          );
          const zGroup = new THREE.Group();
          zGroup.position.copy(campGroup.position);
          zGroup.quaternion.copy(campGroup.quaternion);
          zGroup.add(sprite);
          globePivot.add(zGroup);
          sleepZSprites.push({ sprite: zGroup, localSprite: sprite, vel: 0.4 + i * 0.1, drift: (Math.random() - 0.5) * 0.3, age: 0 });
        }, i * 250);
      }
    }
    // Animate existing Zs
    for (let i = sleepZSprites.length - 1; i >= 0; i--) {
      const z = sleepZSprites[i];
      z.age += delta;
      z.localSprite.position.y += z.vel * delta;
      z.localSprite.position.x += z.drift * delta;
      z.localSprite.material.opacity = Math.max(0, 1 - z.age / 3);
      if (z.age > 3) {
        globePivot.remove(z.sprite);
        sleepZSprites.splice(i, 1);
      }
    }
  }

  // Animate fire if camp is pitched
  if (campPitched && campFireGeo) {
    const elapsed = clock.elapsedTime;

    // Fire light flicker
    campFireLight.intensity += (Math.random() - 0.5) * 0.4;
    campFireLight.intensity = Math.max(0.5, Math.min(4, campFireLight.intensity));
    campFireLight2.intensity = campFireLight.intensity * 0.6 + (Math.random() - 0.5) * 0.2;

    // Coal pulsing
    for (let i = 0; i < campCoals.length; i++) {
      const pulse = 0.3 + Math.sin(elapsed * (1.5 + i * 0.3) + i * 2) * 0.25 + Math.random() * 0.1;
      campCoals[i].material.emissiveIntensity = pulse;
    }

    // Fire particle physics
    const fp = campFireGeo.attributes.position.array;
    for (let i = 0; i < 56; i++) {
      const x = fp[i * 3];
      const y = fp[i * 3 + 1];
      const z = fp[i * 3 + 2];
      const distFromCenter = Math.sqrt(x * x + z * z);

      if (campFireAlphas[i] === 1) {
        fp[i * 3] += (Math.random() - 0.5) * 0.004;
        fp[i * 3 + 1] += 0.039 + Math.random() * 0.026;
        fp[i * 3 + 2] += (Math.random() - 0.5) * 0.004;
      } else if (distFromCenter > 0.06) {
        const pullStrength = 0.008 + distFromCenter * 0.016;
        fp[i * 3] -= (x / distFromCenter) * pullStrength;
        fp[i * 3 + 2] -= (z / distFromCenter) * pullStrength;
        fp[i * 3 + 1] += 0.008 + (1 - distFromCenter) * 0.01;
      } else {
        fp[i * 3] += (Math.random() - 0.5) * 0.004;
        fp[i * 3 + 1] += 0.016 + Math.random() * 0.01;
        fp[i * 3 + 2] += (Math.random() - 0.5) * 0.004;
      }

      if (fp[i * 3 + 1] > campFireLifespan[i]) {
        respawnCampFireParticle(fp, i, false);
      }
    }
    campFireGeo.attributes.position.needsUpdate = true;

    // Smoke animation
    const sp = campSmokeGeo.attributes.position.array;
    for (let i = 0; i < 30; i++) {
      sp[i * 3] += campSmokeVelocities[i].x;
      sp[i * 3 + 1] += campSmokeVelocities[i].y;
      sp[i * 3 + 2] += campSmokeVelocities[i].z;
      if (sp[i * 3 + 1] > 5) {
        sp[i * 3] = (Math.random() - 0.5) * 0.3;
        sp[i * 3 + 1] = 1.5;
        sp[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
      }
    }
    campSmokeGeo.attributes.position.needsUpdate = true;
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
if (navigator.maxTouchPoints === 0) document.getElementById('lever-wrapper').style.display = 'none';
</script>
</body>
</html>
